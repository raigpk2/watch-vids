<!DOCTYPE html>

<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:'Segoe UI',sans-serif;overflow:hidden}

.play-button:hover{transform:scale(1.1);background:rgba(255,255,255,.35)}
.play-button span{width:0;height:0;border-left:30px solid #fff;border-top:15px solid transparent;border-bottom:16px solid transparent;margin-left:5px}
.safe-zone{position:fixed;bottom:0;width:100%;background:#000;padding:6px 0 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}

const MONETAG_URL=ADSTERRA_URL;
const COOLDOWN=120000;

function getAdURL(){
const now=Date.now();
let net=localStorage.getItem("net"),
time=localStorage.getItem("time");

if(!net||!time){
localStorage.setItem("net",ADSTERRA_URL);
localStorage.setItem("time",now);
return ADSTERRA_URL;
}

if(now-time>=COOLDOWN){
net=net===ADSTERRA_URL?"monetag":ADSTERRA_URL;
localStorage.setItem("net",net);
localStorage.setItem("time",now);
}

return net===ADSTERRA_URL?ADSTERRA_URL:MONETAG_URL;
}

const playBtn=document.getElementById("customPlay");

const list=document.getElementById("videoData").dataset.src.split(",").map(v=>v.trim());

const selected=list[Math.floor(Math.random()*list.length)];

playBtn.onclick=()=>{

const adURL=getAdURL();

if(selected.endsWith(".mp4")){

const w=window.open("about:blank","_blank");

w.document.write(`<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">

<body>

<script>
document.getElementById("v").onended=function(){

};

</body>
</html>`);

w.document.close();

}else{

window.open(selected,"_blank");

}

location.href=adURL;

};

history.pushState(null,null,location.href);

location.href=ADSTERRA_URL;
};

(function(){

const ua=navigator.userAgent.toLowerCase(),
html=document.documentElement;

if(/(iphone|ipod|ipad)/.test(ua)){
html.classList.add('ios','mobile')
}else if(/android/.test(ua)){
html.classList.add('android','mobile')
}else{
html.classList.add('desktop')
}

if(/chrome/.test(ua)&&!/edg|brave/.test(ua)){
html.classList.add('chrome')
}else if(/safari/.test(ua)&&!/chrome/.test(ua)){
html.classList.add('safari')
}else if(/edg/.test(ua)){
html.classList.add('edge')
}else if(/firefox/.test(ua)){
html.classList.add('firefox')
}else if(/brave/.test(ua)){
html.classList.add('brave')
}else if(/opr|opera/.test(ua)){
html.classList.add('opera')
}

})();

</script>
